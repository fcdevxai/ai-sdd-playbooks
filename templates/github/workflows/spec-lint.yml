name: "Spec Lint - Validar estructura de spec en PR"

on:
  pull_request:
    paths:
      - 'openspec/changes/**'
      # TODO: agrega aquí los paths de código fuente de tu proyecto
      # Ejemplos:
      # - 'src/**'
      # - 'app/**'
      # - 'resources/**'
      # - 'tests/**'
      # - 'lib/**'

jobs:
  spec-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verificar que existe spec para esta rama
        run: |
          BRANCH="${{ github.head_ref }}"
          SPEC_DIR="openspec/changes/${BRANCH}"

          if [ ! -d "$SPEC_DIR" ]; then
            echo "❌ ERROR: No existe spec activa en '$SPEC_DIR'"
            echo ""
            echo "Antes de abrir un PR, crea la spec ejecutando /sdd-enrich-us en Claude Code."
            echo "El nombre de la carpeta debe coincidir exactamente con el nombre de la rama: openspec/changes/${BRANCH}/"
            exit 1
          fi

          echo "✅ Spec encontrada: $SPEC_DIR"

      - name: Verificar estructura mínima de la spec
        run: |
          BRANCH="${{ github.head_ref }}"
          SPEC_DIR="openspec/changes/${BRANCH}"
          REQUIRED_FILES=("proposal.md" "tasks.md" "OWNER.md")
          FAILED=0

          for FILE in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$SPEC_DIR/$FILE" ]; then
              echo "❌ ERROR: Falta '$FILE' en '$SPEC_DIR'"
              FAILED=1
            fi
          done

          if [ $FAILED -eq 1 ]; then
            echo ""
            echo "La estructura mínima de una spec es:"
            echo "  openspec/changes/{branch}/"
            echo "    ├── proposal.md   (generado por /sdd-enrich-us)"
            echo "    ├── tasks.md      (generado por /sdd-new)"
            echo "    └── OWNER.md      (generado por /sdd-new)"
            exit 1
          fi

          echo "✅ Estructura mínima válida"

      - name: Verificar secciones obligatorias en proposal.md
        run: |
          BRANCH="${{ github.head_ref }}"
          PROPOSAL="openspec/changes/${BRANCH}/proposal.md"
          FAILED=0

          if ! grep -q "## Acceptance criteria" "$PROPOSAL"; then
            echo "❌ ERROR: proposal.md no tiene la sección '## Acceptance criteria'"
            echo "   Los criterios de aceptación son obligatorios. Generados por /sdd-new."
            FAILED=1
          fi

          if ! grep -q "## Error cases" "$PROPOSAL"; then
            echo "❌ ERROR: proposal.md no tiene la sección '## Error cases'"
            echo "   Una spec sin casos de error es una spec incompleta. Generados por /sdd-new."
            FAILED=1
          fi

          if ! grep -q "## Constraints and non-goals" "$PROPOSAL"; then
            echo "❌ ERROR: proposal.md no tiene la sección '## Constraints and non-goals'"
            echo "   Las restricciones definen el scope del agente y previenen cambios fuera de scope. Generadas por /sdd-new."
            FAILED=1
          fi

          if [ $FAILED -eq 1 ]; then
            exit 1
          fi

          echo "✅ Secciones obligatorias presentes en proposal.md"

      - name: Verificar que el proposal no está en estado DRAFT
        run: |
          BRANCH="${{ github.head_ref }}"
          PROPOSAL="openspec/changes/${BRANCH}/proposal.md"

          if grep -q "status: draft" "$PROPOSAL"; then
            echo "❌ ERROR: proposal.md tiene status: draft"
            echo "   El proposal debe ser revisado y aprobado (status: pending) antes de abrir un PR."
            echo "   Un revisor humano debe cambiar 'status: draft' a 'status: pending' en el frontmatter."
            exit 1
          fi

          echo "✅ Proposal aprobado (status: pending)"

      - name: Verificar code-review-report.md
        run: |
          BRANCH="${{ github.head_ref }}"
          SPEC_DIR="openspec/changes/${BRANCH}"
          REPORT="$SPEC_DIR/code-review-report.md"

          if [ ! -f "$REPORT" ]; then
            echo "❌ ERROR: Falta 'code-review-report.md' en '$SPEC_DIR'"
            echo "   Ejecuta /sdd-code-review en Claude Code antes de abrir el PR."
            exit 1
          fi

          if grep -q "REQUIRES FIXES" "$REPORT"; then
            echo "❌ ERROR: El /sdd-code-review automático encontró problemas sin resolver"
            echo ""
            echo "--- Contenido del reporte ---"
            cat "$REPORT"
            echo "----------------------------"
            echo ""
            echo "Corrige los issues y ejecuta /sdd-code-review de nuevo antes de continuar."
            exit 1
          fi

          if ! grep -q "READY FOR PR" "$REPORT"; then
            echo "⚠️  ADVERTENCIA: code-review-report.md no contiene el veredicto esperado."
            echo "   Asegúrate de que el reporte incluya 'READY FOR PR' como veredicto final."
            exit 1
          fi

          echo "✅ Code review automático aprobado"

      - name: Verificar ux-gate-report.md
        run: |
          BRANCH="${{ github.head_ref }}"
          SPEC_DIR="openspec/changes/${BRANCH}"
          REPORT="$SPEC_DIR/ux-gate-report.md"

          if [ ! -f "$REPORT" ]; then
            echo "❌ ERROR: Falta 'ux-gate-report.md' en '$SPEC_DIR'"
            echo "   Ejecuta /sdd-ux-gate en Claude Code antes de abrir el PR."
            exit 1
          fi

          if grep -q "REQUIRES UX FIXES" "$REPORT"; then
            echo "❌ ERROR: El /sdd-ux-gate encontró problemas UX sin resolver"
            echo ""
            echo "--- Contenido del reporte ---"
            cat "$REPORT"
            echo "----------------------------"
            echo ""
            echo "Corrige los issues UX y ejecuta /sdd-ux-gate de nuevo antes de continuar."
            exit 1
          fi

          if ! grep -q "READY FOR PR UX" "$REPORT"; then
            echo "⚠️  ADVERTENCIA: ux-gate-report.md no contiene el veredicto esperado."
            echo "   Asegúrate de que el reporte incluya 'READY FOR PR UX' como veredicto final."
            exit 1
          fi

          echo "✅ UX gate aprobado"
